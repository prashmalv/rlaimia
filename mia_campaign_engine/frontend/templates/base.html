<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Mia Campaign Engine{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>

  <!-- ─── Sidebar ──────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-mia">mia</span>
      <span class="logo-sub">Campaign Engine</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/"        class="nav-item {% block nav_dashboard %}{% endblock %}">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="/files"   class="nav-item {% block nav_files %}{% endblock %}">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        Files
      </a>
      <a href="/templates" class="nav-item {% block nav_templates %}{% endblock %}">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        Templates
      </a>
      <a href="/docs"    class="nav-item" target="_blank">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        API Docs
      </a>
    </nav>
    <div class="sidebar-bottom">
      <div class="brand-tagline">Bulk Greeting Generator</div>
      <div id="sidebarUser" style="margin-top:12px;font-size:11px;color:var(--mia-muted);display:none">
        <span id="sidebarRoleBadge" style="padding:2px 8px;border-radius:4px;font-weight:600;font-size:10px"></span>
        <button onclick="doLogout()" style="background:none;border:none;color:var(--mia-muted);font-size:11px;cursor:pointer;margin-left:8px;text-decoration:underline">Logout</button>
      </div>
    </div>
  </aside>

  <!-- ─── Main Content ──────────────────────────────────────────────────── -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/dashboard.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
